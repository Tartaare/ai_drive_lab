<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX - Next Gen Racing</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <!-- Game Layer -->
    <div id="game-container"></div>

    <!-- UI Layer -->
    <div class="ui-layer" id="ui-layer">
        
        <!-- Loading -->
        <div id="loading" class="loader-overlay">
            <h3 style="letter-spacing: 0.2em; font-size: 0.9rem; margin-bottom: 20px;">INITIALIZING ENGINE</h3>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>

        <!-- Settings Toggle (In-Game) -->
        <button id="toggle-settings" class="settings-toggle hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
            </svg>
        </button>

        <!-- Main Menu -->
        <div id="main-menu" class="menu-overlay hidden">
            <div class="title-container">
                <div class="main-title">APEX</div>
                <div class="subtitle">PHYSICS DRIVING SIMULATION</div>
            </div>
            
            <div class="menu-grid">
                <div style="position: relative;">
                    <label class="slider-label" style="position: absolute; top: -20px; left: 0;">SELECT TRACK</label>
                    <select id="main-menu-level-select" class="cyber-select">
                        <option value="default">GRAND PRIX CIRCUIT</option>
                        <option value="procedural">INFINITE PROCEDURAL</option>
                    </select>
                </div>
                
                <button id="start-game" class="cyber-btn">
                    START ENGINE
                </button>
            </div>
        </div>

        <!-- Pause Menu -->
        <div id="pause-overlay" class="menu-overlay hidden">
            <h1 style="font-size: 5rem; margin-bottom: 2rem; opacity: 0.8; letter-spacing: 0.1em;">PAUSED</h1>
            <div class="menu-grid" style="max-width: 300px;">
                <button id="resume-game" class="cyber-btn">RESUME</button>
                <button id="back-to-menu" class="cyber-btn" style="border-color: var(--c-danger);">ABORT SESSION</button>
            </div>
        </div>

        <!-- HUD: Telemetry Cluster -->
        <div id="hud-cluster" class="hud-cluster hidden">
            <!-- RPM Gauge -->
            <div class="gauge-container">
                <svg width="280" height="280" viewBox="0 0 240 240">
                    <!-- Background Arc -->
                    <path class="rpm-circle-bg" d="M 60 180 A 85 85 0 1 1 180 180" stroke-linecap="round" />
                    <!-- Foreground Arc (Dynamic) -->
                    <!-- stroke-dasharray calculated for r=85, arc~270deg. 2*PI*85 = 534. 270/360 * 534 ~ 400. -->
                    <!-- We will set dasharray to 400 and offset to 400 (empty) -> 0 (full) -->
                    <path class="rpm-circle-fill" id="rpm-arc" d="M 60 180 A 85 85 0 1 1 180 180" />
                </svg>

                <div id="transmission-mode" class="transmission-mode-badge">AUTO</div>

                <div class="center-speed">
                    <div class="center-speed-value" id="speed-value">0</div>
                    <div class="center-speed-unit">KM/H</div>
                </div>

                <div class="gear-indicator">
                    <span id="gear-value">N</span>
                    <span class="gear-label">GEAR</span>
                </div>
            </div>

            <div id="rpm-debug" style="position:absolute; bottom: 18px; left: 18px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 12px; color: rgba(255,255,255,0.75); pointer-events: none; user-select: none;">
                RPM: 0
            </div>
        </div>

        <!-- HUD: Controls Hint -->
        <div id="controls-hint" class="controls-hint hidden">
            <div class="key-group">
                <div class="key-icon">Z</div><div class="key-icon">S</div>
                <span class="key-desc">THROTTLE / BRAKE</span>
            </div>
            <div class="key-group">
                <div class="key-icon">Q</div><div class="key-icon">D</div>
                <span class="key-desc">STEER</span>
            </div>
            <div class="key-group">
                <div class="key-icon" style="width: auto; padding: 0 8px;">SPACE</div>
                <span class="key-desc">HANDBRAKE</span>
            </div>
            <div class="key-group">
                <div class="key-icon">M</div>
                <span class="key-desc">AUTO / MANUAL</span>
            </div>
            <div class="key-group">
                <div class="key-icon">↑</div><div class="key-icon">↓</div>
                <span class="key-desc">SHIFT</span>
            </div>
            <div class="key-group">
                <div class="key-icon">R</div>
                <span class="key-desc">RESET</span>
            </div>
        </div>

        <!-- Side Panel: Procedural Settings -->
        <div id="settings-panel" class="settings-panel">
            <div class="settings-header">
                <h3>TRACK CONFIGURATION</h3>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            
            <button id="proc-regenerate" class="cyber-btn" style="width: 100%; margin-bottom: 2rem; font-size: 0.9rem;">
                GENERATE NEW TRACK
            </button>

            <div class="slider-group">
                <div class="slider-label"><span>COMPLEXITY</span> <span class="slider-value" id="proc-numControlPoints-value">12</span></div>
                <input id="proc-numControlPoints" type="range" min="6" max="20" step="1" value="12">
            </div>

            <div class="slider-group">
                <div class="slider-label"><span>SCALE</span> <span class="slider-value" id="proc-baseRadius-value">50</span></div>
                <input id="proc-baseRadius" type="range" min="30" max="150" step="1" value="50">
            </div>

            <div class="slider-group">
                <div class="slider-label"><span>CHAOS</span> <span class="slider-value" id="proc-radiusVariation-value">40%</span></div>
                <input id="proc-radiusVariation" type="range" min="0" max="100" step="1" value="40">
            </div>

            <div class="slider-group">
                <div class="slider-label"><span>TWIST</span> <span class="slider-value" id="proc-angleVariation-value">30%</span></div>
                <input id="proc-angleVariation" type="range" min="0" max="100" step="1" value="30">
            </div>

            <div class="slider-group">
                <div class="slider-label"><span>WIDTH</span> <span class="slider-value" id="proc-trackWidth-value">10</span></div>
                <input id="proc-trackWidth" type="range" min="5" max="30" step="1" value="10">
            </div>
        </div>

    </div>

    <script src="build/simple_car.min.js"></script>
    <script>
        // --- Core Variables ---
        let world = null;
        let gameStarted = false;
        
        // --- UI Refs ---
        const ui = {
            loading: document.getElementById('loading'),
            mainMenu: document.getElementById('main-menu'),
            pauseMenu: document.getElementById('pause-overlay'),
            hud: document.getElementById('hud-cluster'),
            controlsHint: document.getElementById('controls-hint'),
            settingsToggle: document.getElementById('toggle-settings'),
            settingsPanel: document.getElementById('settings-panel'),
            
            // Interactive
            startBtn: document.getElementById('start-game'),
            resumeBtn: document.getElementById('resume-game'),
            menuBtn: document.getElementById('back-to-menu'),
            closeSettingsBtn: document.getElementById('close-settings'),
            procRegenBtn: document.getElementById('proc-regenerate'),
            
            // Inputs
            mainLevelSelect: document.getElementById('main-menu-level-select'),
            
            // Telemetry
            speedVal: document.getElementById('speed-value'),
            gearVal: document.getElementById('gear-value'),
            transmissionMode: document.getElementById('transmission-mode'),
            rpmArc: document.getElementById('rpm-arc'),
            rpmDebug: document.getElementById('rpm-debug'),
            
            // Procedural
            sliders: {
                numControlPoints: document.getElementById('proc-numControlPoints'),
                baseRadius: document.getElementById('proc-baseRadius'),
                radiusVariation: document.getElementById('proc-radiusVariation'),
                angleVariation: document.getElementById('proc-angleVariation'),
                trackWidth: document.getElementById('proc-trackWidth')
            },
            values: {
                numControlPoints: document.getElementById('proc-numControlPoints-value'),
                baseRadius: document.getElementById('proc-baseRadius-value'),
                radiusVariation: document.getElementById('proc-radiusVariation-value'),
                angleVariation: document.getElementById('proc-angleVariation-value'),
                trackWidth: document.getElementById('proc-trackWidth-value')
            }
        };

        // --- Initialization ---
        window.addEventListener('load', () => {
            // Fake load time for immersion
            setTimeout(() => {
                ui.loading.classList.add('hidden');
                ui.mainMenu.classList.remove('hidden');
            }, 1200);
        });

        // --- Game Flow ---
        function startGame() {
            if (gameStarted) return;
            gameStarted = true;

            const level = ui.mainLevelSelect.value;
            
            // Dispose old if exists
            if (world && world.dispose) world.dispose();

            // Create World
            world = new SimpleCar.World('car_models/car_blue.glb', level);

            // Transitions
            ui.mainMenu.classList.add('hidden');
            ui.hud.classList.remove('hidden');
            ui.controlsHint.classList.remove('hidden');
            ui.settingsToggle.classList.remove('hidden');

            // Sync Settings UI if Procedural
            if (level === 'procedural') {
                setTimeout(refreshSettingsUI, 200);
                ui.settingsToggle.style.display = 'flex';
            } else {
                ui.settingsToggle.style.display = 'none';
                if(level !== 'procedural') ui.settingsToggle.classList.add('hidden');
            }
        }

        function stopGame() {
            if (world && world.dispose) world.dispose();
            world = null;
            gameStarted = false;

            ui.pauseMenu.classList.add('hidden');
            ui.hud.classList.add('hidden');
            ui.controlsHint.classList.add('hidden');
            ui.settingsToggle.classList.add('hidden');
            ui.settingsPanel.classList.remove('active');
            
            ui.mainMenu.classList.remove('hidden');
            
            // Reset Gauge
            updateRPM(0, 0);
        }

        function togglePause() {
            if (!gameStarted) return;
            const isPaused = !ui.pauseMenu.classList.contains('hidden');
            
            if (isPaused) {
                if (world && world.resume) world.resume();
                ui.pauseMenu.classList.add('hidden');
            } else {
                if (world && world.pause) world.pause(); 
                ui.pauseMenu.classList.remove('hidden');
            }
        }

        // --- Event Listeners ---
        ui.startBtn.addEventListener('click', startGame);
        ui.resumeBtn.addEventListener('click', () => {
             if (world && world.resume) world.resume();
             ui.pauseMenu.classList.add('hidden');
        });
        ui.menuBtn.addEventListener('click', stopGame);
        
        ui.settingsToggle.addEventListener('click', () => {
            ui.settingsPanel.classList.toggle('active');
        });
        ui.closeSettingsBtn.addEventListener('click', () => {
            ui.settingsPanel.classList.remove('active');
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') togglePause();
        });

        // --- Procedural Logic ---
        ui.procRegenBtn.addEventListener('click', () => {
            if (world && world.randomizeProceduralSeed) {
                world.randomizeProceduralSeed();
                refreshSettingsUI();
            }
        });

        function refreshSettingsUI() {
            if (!world || !world.getProceduralConfig) return;
            const cfg = world.getProceduralConfig();
            
            updateSlider(ui.sliders.numControlPoints, ui.values.numControlPoints, cfg.numControlPoints);
            updateSlider(ui.sliders.baseRadius, ui.values.baseRadius, cfg.baseRadius);
            updateSlider(ui.sliders.radiusVariation, ui.values.radiusVariation, Math.round(cfg.radiusVariation * 100), '%');
            updateSlider(ui.sliders.angleVariation, ui.values.angleVariation, Math.round(cfg.angleVariation * 100), '%');
            updateSlider(ui.sliders.trackWidth, ui.values.trackWidth, cfg.trackWidth);
        }

        function updateSlider(input, display, value, suffix = '') {
            input.value = value;
            display.textContent = value + suffix;
        }

        // Bind Sliders
        function bindProcSlider(input, display, param, scale = 1, suffix = '') {
            input.addEventListener('input', () => {
                if (!world || !world.setProceduralParameter) return;
                const val = parseInt(input.value, 10);
                world.setProceduralParameter(param, scale === 1 ? val : val / scale);
                display.textContent = val + suffix;
            });
        }

        bindProcSlider(ui.sliders.numControlPoints, ui.values.numControlPoints, 'numControlPoints');
        bindProcSlider(ui.sliders.baseRadius, ui.values.baseRadius, 'baseRadius');
        bindProcSlider(ui.sliders.radiusVariation, ui.values.radiusVariation, 'radiusVariation', 100, '%');
        bindProcSlider(ui.sliders.angleVariation, ui.values.angleVariation, 'angleVariation', 100, '%');
        bindProcSlider(ui.sliders.trackWidth, ui.values.trackWidth, 'trackWidth');

        // --- Telemetry Loop & RPM Animation ---
        let MAX_RPM_OFFSET = 0;
        if (ui.rpmArc && typeof ui.rpmArc.getTotalLength === 'function') {
            MAX_RPM_OFFSET = ui.rpmArc.getTotalLength();
            ui.rpmArc.style.strokeDasharray = `${MAX_RPM_OFFSET}`;
            ui.rpmArc.style.strokeDashoffset = `${MAX_RPM_OFFSET}`;
        }
        
        function updateRPM(currentRpm, maxRpm) {
            if (!ui.rpmArc || !MAX_RPM_OFFSET || !Number.isFinite(MAX_RPM_OFFSET)) return;

            if (!maxRpm || !Number.isFinite(maxRpm) || maxRpm <= 0) {
                ui.rpmArc.style.strokeDashoffset = `${MAX_RPM_OFFSET}`;
                ui.rpmArc.classList.remove('redline');
                return;
            }

            // Calculate ratio 0..1
            const ratio = Math.min(Math.max(currentRpm / maxRpm, 0), 1);
            
            // Calculate offset: 400 (empty) -> 0 (full)
            const offset = MAX_RPM_OFFSET - (ratio * MAX_RPM_OFFSET);
            
            ui.rpmArc.style.strokeDashoffset = offset;
            
            // Redline effect
            if (ratio > 0.9) {
                ui.rpmArc.classList.add('redline');
            } else {
                ui.rpmArc.classList.remove('redline');
            }
        }


        setInterval(() => {
            if (!world || !world.car) return;

            // Speed
            const speed = Math.abs(Math.round(world.car.speed * 3.6));
            ui.speedVal.textContent = speed;

            // Gear
            const gear = world.car.currentGear;
            const isManual = !!world.car.isManualTransmission;
            let gearText = String(gear);

            if (gear <= -1) gearText = 'R';
            else if (gear === 0) gearText = 'N';
            ui.gearVal.textContent = gearText;

            if (ui.transmissionMode)
            {
                ui.transmissionMode.textContent = isManual ? 'MAN' : 'AUTO';
            }

            // RPM - Utiliser uniquement les vraies valeurs du moteur
            const currentRpm = world.car.currentRpm || 0;
            const redlineRpm = world.car.redlineRpm || 8000;

            if (ui.rpmDebug)
            {
                const rpmText = Math.round(currentRpm);
                const maxText = Math.round(redlineRpm);
                ui.rpmDebug.textContent = `RPM: ${rpmText} / ${maxText}`;
            }

            updateRPM(currentRpm, redlineRpm);

        }, 50);

    </script>
</body>
</html>
