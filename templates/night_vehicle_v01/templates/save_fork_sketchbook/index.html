<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Car - Driving Experience</title>
    <style>
        :root {
            --accent-color: #ff3b30; /* Racing Red */
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-color);
        }
        
        canvas {
            display: block;
            outline: none;
        }
        
        /* UI Overlay Layer */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Notifications (Toasts) */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(30, 30, 30, 0.9);
            border-left: 4px solid var(--accent-color);
            padding: 15px 20px;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            color: white;
            animation: slideIn 0.3s ease-out;
            min-width: 250px;
        }

        .toast.success { border-color: #4cd964; }
        .toast.error { border-color: #ff3b30; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Game HUD (hidden in menu) */
        .game-ui {
            opacity: 0;
            transition: opacity 0.5s;
        }

        .game-ui.visible {
            opacity: 1;
        }

        #controls-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 13px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #controls-info h3 {
            margin-bottom: 10px;
            color: var(--accent-color);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        #speed-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            text-align: right;
        }
        
        #speed-display .value {
            font-size: 64px;
            font-weight: 800;
            font-style: italic;
            line-height: 1;
        }
        
        #speed-display .unit {
            font-size: 18px;
            color: #aaa;
            font-weight: 500;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }
        
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Menus */
        .menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.4s ease;
            background: rgba(10, 10, 10, 0.8); /* Default dim */
            backdrop-filter: blur(10px);
        }

        /* Garage & Map Mode: Transparent background to see 3D scene */
        .menu-screen.scene-view {
            background: transparent;
            backdrop-filter: none;
            justify-content: flex-end; /* Bottom aligned controls */
            padding-bottom: 50px;
        }

        .menu-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.02);
        }

        .menu-container {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 2px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .menu-title {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background: white;
            color: black;
            transform: translateX(5px);
        }

        .menu-btn.primary {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }
        
        .menu-btn.primary:hover {
            background: #ff5b50;
            transform: scale(1.02);
        }

        /* Garage Specific UI */
        .garage-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .carousel-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 48px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            padding: 0 20px;
        }

        .nav-btn:hover { opacity: 1; }

        .car-info {
            text-align: center;
        }

        .car-name {
            font-size: 32px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .car-meta {
            color: #888;
            font-size: 14px;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: white;
            color: black;
        }

        .icon-btn.danger:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .back-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.7;
            transition: opacity 0.2s;
            z-index: 2000;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .back-nav:hover { opacity: 1; }

        /* Map Selection Cards */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .map-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .map-card:hover, .map-card.selected {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .map-card h3 { margin-bottom: 5px; font-size: 18px; }
        .map-card p { font-size: 12px; color: #888; }

    </style>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Loading Screen -->
    <div id="loading">
        <div style="font-size: 24px; font-weight: 800; letter-spacing: 2px;">SIMPLE CAR</div>
        <div class="loader"></div>
    </div>
    
    <!-- Main Menu -->
    <div id="main-menu" class="menu-screen">
        <div class="menu-container">
            <h1 class="menu-title">Drive</h1>
            
            <button class="menu-btn" onclick="showScreen('vehicle-menu')">Garage</button>
            <button class="menu-btn" onclick="showScreen('map-menu')">Circuits</button>
            
            <div style="margin: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <label style="display:block; text-align:left; margin-bottom:10px; color:#888; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Mode de conduite</label>
                <div style="display:flex; gap:10px;">
                    <button class="menu-btn" id="btn-mode-manual" onclick="setMode('manual')" style="flex:1; background:white; color:black;">Manuel</button>
                    <button class="menu-btn" id="btn-mode-ai" onclick="setMode('ai')" style="flex:1; opacity: 0.5;">IA</button>
                </div>
            </div>

            <button class="menu-btn primary" onclick="startGame()">Démarrer</button>
        </div>
    </div>

    <!-- Garage (Vehicle Selection) -->
    <div id="vehicle-menu" class="menu-screen scene-view hidden">
        <button class="back-nav" onclick="showScreen('main-menu')">❮ Retour</button>

        <div class="garage-controls interactive">
            <div class="carousel-nav">
                <button class="nav-btn" onclick="prevCar()">❮</button>
                
                <div class="car-info">
                    <div class="car-name" id="current-car-name">Sport Red</div>
                    <div class="car-meta">Modèle standard</div>
                </div>

                <button class="nav-btn" onclick="nextCar()">❯</button>
            </div>

            <div class="action-bar">
                <input type="file" id="file-input" accept=".glb" style="display: none;" onchange="handleFileUpload(event)">
                
                <button class="menu-btn" onclick="document.getElementById('file-input').click()" style="width: auto; padding: 10px 30px;">
                    Importer Modèle 3D
                </button>
                
                <button class="icon-btn danger" id="btn-delete-car" onclick="deleteCurrentCar()" title="Supprimer ce véhicule">
                    ✕
                </button>
            </div>
        </div>
    </div>

    <!-- Map Selection -->
    <div id="map-menu" class="menu-screen hidden">
        <button class="back-nav" onclick="showScreen('main-menu')">❮ Retour</button>
        
        <div class="menu-container" style="width: auto; max-width: 1000px; background: transparent; box-shadow: none;">
            <h1 class="menu-title" style="text-align: left; font-size: 32px; margin-bottom: 20px;">Sélection du Circuit</h1>
            
            <div class="map-grid" id="map-grid">
                <!-- Maps generated by JS -->
            </div>

            <div style="text-align: left; margin-top: 30px;">
                 <input type="file" id="map-input" accept=".glb" style="display: none;" onchange="handleMapUpload(event)">
                 <button class="menu-btn" onclick="document.getElementById('map-input').click()" style="width: auto; display: inline-block;">
                    + Importer Circuit (.glb)
                 </button>
            </div>
        </div>
    </div>

    <!-- AI Mode Warning -->
    <div id="ai-menu" class="menu-screen hidden">
        <div class="menu-container">
            <h1 class="menu-title">Mode IA</h1>
            <p style="color: #888; margin-bottom: 30px;">Le module de pilotage automatique est en cours de calibrage.</p>
            <button class="menu-btn" onclick="showScreen('main-menu')">Retour</button>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="game-ui-layer" class="ui-layer game-ui">
        <div id="controls-info">
            <h3>Contrôles</h3>
            <div>W / S - Accélérer / Freiner</div>
            <div>A / D - Direction</div>
            <div>ESPACE - Frein à main</div>
            <div>R - Réapparaître</div>
            <div>V - Changer vue</div>
        </div>
        
        <div id="speed-display">
            <div class="value" id="speed-value">0</div>
            <div class="unit">KM/H</div>
        </div>
    </div>
    
    <script src="build/simple_car.min.js"></script>
    <script>
        // ==========================================
        // STATE & DATA
        // ==========================================
        const STORAGE_KEY_CARS = 'simple_car_vehicles';
        const STORAGE_KEY_MAPS = 'simple_car_maps';

        let gameMode = 'manual';
        
        const defaultCars = [
            { id: 'std_red', name: "Sport Red", path: "car_models/car_red.glb", type: 'default' },
            { id: 'std_blue', name: "Sport Blue", path: "car_models/car_blue.glb", type: 'default' },
            { id: 'std_orange', name: "Sport Orange", path: "car_models/car_orange.glb", type: 'default' }
        ];

        const defaultMaps = [
            { id: 'grid', name: "Grid World", path: null, desc: "Zone de test infinie" },
            { id: 'track1', name: "Race Track 1", path: "racetracks/Track_Test1/Main.gltf", desc: "Circuit rapide LowPoly" }
        ];

        let availableCars = [...defaultCars];
        let availableMaps = [...defaultMaps];
        
        let currentCarIndex = 0;
        let selectedMapId = 'grid';

        // Load saved custom cars from LocalStorage
        try {
            const savedCars = JSON.parse(localStorage.getItem(STORAGE_KEY_CARS) || '[]');
            // Note: Real persistence of large GLB files usually requires IndexedDB.
            // Here we just load metadata. If we had Blob URLs they would be expired.
            // For this demo, we assume imports are session-only OR we warn user.
            // To make it persistent, we'd need to store the Base64 string or use idb-keyval.
            // We'll clear saved cars that are not defaults on reload for now to avoid broken links.
            console.log('Session storage initialized');
        } catch (e) {
            console.error('Storage error', e);
        }

        // Initialize World
        // Start with first car
        const world = new SimpleCar.World(availableCars[0].path);

        // ==========================================
        // UI FUNCTIONS
        // ==========================================

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(screenId);
            if (target) {
                target.classList.remove('hidden');
                
                // Special behavior for Garage
                if (screenId === 'vehicle-menu') {
                    updateCarDisplay();
                }
            }
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('btn-mode-manual').style.background = mode === 'manual' ? 'white' : 'rgba(255,255,255,0.1)';
            document.getElementById('btn-mode-manual').style.color = mode === 'manual' ? 'black' : 'white';
            
            document.getElementById('btn-mode-ai').style.background = mode === 'ai' ? 'white' : 'rgba(255,255,255,0.1)';
            document.getElementById('btn-mode-ai').style.color = mode === 'ai' ? 'black' : 'white';
            document.getElementById('btn-mode-ai').style.opacity = mode === 'ai' ? '1' : '0.5';
        }

        // ==========================================
        // GARAGE LOGIC
        // ==========================================

        function updateCarDisplay() {
            const car = availableCars[currentCarIndex];
            document.getElementById('current-car-name').textContent = car.name;
            
            // Show/Hide delete button
            const deleteBtn = document.getElementById('btn-delete-car');
            deleteBtn.style.display = car.type === 'default' ? 'none' : 'flex';

            // Load car in background
            world.loadCar(car.path).catch(err => {
                showToast("Erreur chargement voiture", "error");
                console.error(err);
            });
        }

        function nextCar() {
            currentCarIndex = (currentCarIndex + 1) % availableCars.length;
            updateCarDisplay();
        }

        function prevCar() {
            currentCarIndex = (currentCarIndex - 1 + availableCars.length) % availableCars.length;
            updateCarDisplay();
        }

        function deleteCurrentCar() {
            const car = availableCars[currentCarIndex];
            if (car.type === 'default') return;

            if (confirm(`Supprimer ${car.name} ?`)) {
                availableCars.splice(currentCarIndex, 1);
                currentCarIndex = Math.max(0, currentCarIndex - 1);
                updateCarDisplay();
                showToast("Véhicule supprimé");
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.toLowerCase().endsWith('.glb')) {
                showToast('Format .glb requis', 'error');
                return;
            }

            // Create object URL
            const url = URL.createObjectURL(file);
            const newCar = {
                id: 'custom_' + Date.now(),
                name: file.name.replace('.glb', ''),
                path: url,
                type: 'custom'
            };

            availableCars.push(newCar);
            currentCarIndex = availableCars.length - 1;
            updateCarDisplay();
            showToast("Véhicule importé avec succès !");
            
            // Reset input
            event.target.value = '';
        }

        // ==========================================
        // MAP LOGIC
        // ==========================================

        function renderMapList() {
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';

            availableMaps.forEach(map => {
                const card = document.createElement('div');
                card.className = `map-card ${selectedMapId === map.id ? 'selected' : ''}`;
                card.innerHTML = `
                    <h3>${map.name}</h3>
                    <p>${map.desc}</p>
                `;
                card.onclick = () => selectMap(map.id);
                grid.appendChild(card);
            });
        }

        function selectMap(id) {
            selectedMapId = id;
            renderMapList();
        }

        function handleMapUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.toLowerCase().endsWith('.glb')) {
                showToast('Format .glb requis (fichiers .gltf non supportés pour l\'import)', 'error');
                return;
            }

            const url = URL.createObjectURL(file);
            const newMap = {
                id: 'custom_map_' + Date.now(),
                name: file.name.replace(/\.(glb|gltf)$/, ''),
                path: url,
                desc: "Circuit importé"
            };

            availableMaps.push(newMap);
            selectMap(newMap.id);
            showToast("Circuit ajouté !");
        }

        // Init Map List
        renderMapList();

        // ==========================================
        // GAME CONTROL
        // ==========================================

        async function startGame() {
            if (gameMode === 'ai') {
                showScreen('ai-menu');
                return;
            }

            // Show Loading
            document.getElementById('loading').classList.remove('hidden');

            try {
                // 1. Load Map
                const mapData = availableMaps.find(m => m.id === selectedMapId);
                if (mapData && mapData.path) {
                    await world.loadWorld(mapData.path);
                } else {
                    // If grid (default), ensure default ground is there (reload world logic if needed)
                    // For now our World class has default ground. 
                    // If we loaded a custom map before, we might need to reset. 
                    // Simplification: reload page or implementing resetWorld() in TS.
                    // We'll assume for now World handles it or we just load the custom map on top.
                }

                // 2. Start Game
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('main-menu').classList.add('hidden');
                    document.getElementById('game-ui-layer').classList.add('visible');
                    
                    document.body.requestPointerLock();
                    world.startGame();
                }, 1000);

            } catch (err) {
                console.error(err);
                showToast("Erreur au lancement", "error");
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // Initial Load
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
            showScreen('main-menu');
        }, 1000);

        // Speed Loop
        setInterval(() => {
            if (world.car && world.isGameRunning) {
                const speedKmh = Math.abs(Math.round(world.car.speed * 3.6));
                document.getElementById('speed-value').textContent = speedKmh;
            }
        }, 100);

    </script>
</body>
</html>
